<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhumij Rising Star</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-box">
    <img src="images/logo.png">
    <div>
      <h2>BHUMIJ RISING STAR</h2>
      <p>Empowering Youth, Building Future</p>
    </div>
  </div>

  <div>
    <button class="btn blue">Register</button>
    <button onclick="logout()" class="btn red">Logout</button>
  </div>
</header>

<!-- NAV -->
<nav class="navbar">
  <a href="#">Home</a>
  <a href="#about">About</a>
  <a href="#videoList">Videos</a>
  <a href="#register">Register</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Bhumij Rising Star</h1>
  <p>Showcasing Tribal Talent</p>
</section>

<!-- ABOUT -->
<section id="about" class="section">
  <h2>About Project</h2>
  <p>This platform showcases cultural talent and organizes competitions.</p>
</section>

<!-- LOGIN -->
<section class="section">
  <h2>Login / Signup</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button onclick="signup()" class="btn green">Signup</button>
  <button onclick="login()" class="btn blue">Login</button>
</section>

<!-- REGISTER -->
<section id="register" class="section">
  <h2>Register</h2>
  <form id="registerForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="number" id="phone" placeholder="Phone" required>

    <select id="category">
      <option>Dance</option>
      <option>Song</option>
    </select>

    <button type="submit" class="btn blue">Submit</button>
  </form>
</section>

<!-- VIDEO UPLOAD -->
<section class="section">
  <h2>Upload Video</h2>
  <input type="text" id="videoTitle" placeholder="Title">
  <input type="text" id="youtubeLink" placeholder="YouTube Link">
  <button onclick="saveVideo()" class="btn green">Upload</button>
</section>

<!-- VIDEOS -->
<section class="section">
  <h2>All Videos</h2>
  <div id="videoList"></div>
</section>

<footer>
  <p>© 2026 Bhumij Rising Star</p>
</footer>

<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

</body>
</html>
